name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Python Application
      - name: Build Python Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/python-app:latest ./FRONTEND

      # Push Python Image
      - name: Push Python Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/python-app:latest

      # Build React Application
      - name: Build React Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/react-app:latest ./backend

      # Push React Image
      - name: Push React Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/react-app:latest

      - name: Verify Images
        run: docker images