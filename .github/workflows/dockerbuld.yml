name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Python Image
      - name: Build Python Docker Image
        run: |
          docker build \
            -f FRONTEND/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/python-app:latest \
            ./FRONTEND

      # Push Python Image
      - name: Push Python Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/python-app:latest

      # Build React Image
      - name: Build React Docker Image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/react-app:latest \
            ./backend

      # Push React Image
      - name: Push React Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/react-app:latest

      - name: Verify Docker Images
        run: |
          docker images